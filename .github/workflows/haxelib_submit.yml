name: Reflaxe / Publish to Haxelib

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type publish-reflaxe to confirm this external release
        required: true
        type: string

permissions:
  contents: read

jobs:
  haxelib_submit:
    name: Publish to Haxelib
    if: ${{ inputs.confirmation == 'publish-reflaxe' }}
    runs-on: ubuntu-latest
    environment: my-secrets
    steps:
      - uses: actions/checkout@v6
      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7
      - uses: edgarrc/action-7z@v1
        with:
          args: 7z a reflaxe.zip newproject/* src/* LICENSE Run.hx extraParams.hxml haxelib.json
      - run: |
          haxe -version
          haxelib submit reflaxe.zip ${{ secrets.HAXELIB_PASSWORD }} --always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
