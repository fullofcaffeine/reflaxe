# Deliberate workflow for deploying this fork's static documentation.
name: Reflaxe / Deploy fork documentation

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type deploy-fork-pages after enabling Pages for this repository
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    if: ${{ inputs.confirmation == 'deploy-fork-pages' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7
      - name: Install Dox
        run: haxelib install dox
      - name: Generate Documentation XML
        run: haxe GenDocs.hxml
        working-directory: ./documentation
      - name: Build Website
        run: ./GenSite.bat
        working-directory: ./documentation

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './documentation/pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
